<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Goorsche Inburgeringstest 2026</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Playfair+Display:ital,wght@0,600;0,700;1,400&display=swap" rel="stylesheet">
    <style>
        :root { 
            --goor-rood: #C8102E; 
            --goor-rood-dark: #9e0c24;
            --goor-zilver: #f0f0f0; 
            --goor-goud: #D4AF37; 
            --bg-color: #fafafa; 
            --text-color: #222; 
            --card-bg: #ffffff; 
        }
        
        body { 
            font-family: 'Montserrat', sans-serif; 
            background-color: var(--bg-color); 
            color: var(--text-color); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 40px 20px; 
            line-height: 1.6;
        }

        h1, h2, h3 { 
            font-family: 'Playfair Display', serif; 
            color: var(--goor-rood); 
            margin-top: 0;
        }

        .quiz-wrapper { 
            background: var(--card-bg); 
            max-width: 700px; 
            width: 100%; 
            border-radius: 4px; /* Strakke hoeken in plaats van extreem rond */
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.08); 
            padding: 40px; 
            text-align: center; 
            border-top: 6px solid var(--goor-rood); 
            position: relative;
        }

        .wapen-img { 
            width: 80px; 
            height: auto; 
            margin-top: -20px; 
            margin-bottom: 15px; 
        }

        h1.main-title { font-size: 2.8em; margin-bottom: 20px; letter-spacing: -0.5px; }

        .input-group { margin: 20px 0; text-align: left; }
        label { display: block; font-weight: 600; margin-bottom: 8px; color: #444; font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; }
        
        input[type="text"], input[type="date"] { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-family: 'Montserrat', sans-serif;
            font-size: 1em;
            transition: border-color 0.2s, box-shadow 0.2s; 
        }
        input[type="text"]:focus, input[type="date"]:focus { 
            border-color: var(--goor-rood); 
            outline: none; 
            box-shadow: 0 0 0 3px rgba(200, 16, 46, 0.1);
        }

        button { 
            background-color: var(--goor-rood); 
            color: white; 
            border: none; 
            padding: 16px; 
            font-size: 1.1em; 
            border-radius: 4px; 
            cursor: pointer; 
            width: 100%; 
            margin-top: 15px; 
            font-weight: 700; 
            font-family: 'Montserrat', sans-serif;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background-color 0.2s, transform 0.1s;
        }
        button:hover:not(:disabled) { background-color: var(--goor-rood-dark); }
        button:disabled { background-color: #ddd; color: #888; cursor: not-allowed; }

        .option-button { 
            background-color: #fff; 
            color: var(--text-color); 
            border: 2px solid #eaeaea; 
            margin: 8px 0; 
            text-transform: none;
            font-weight: 600;
            letter-spacing: 0;
            text-align: left;
            padding: 18px 20px;
        }
        .option-button:hover:not(:disabled) { border-color: #bbb; background-color: #fafafa; }
        .option-button.selected { 
            background-color: #fffafb; 
            color: var(--goor-rood); 
            border-color: var(--goor-rood); 
            box-shadow: inset 4px 0 0 var(--goor-rood);
        }

        .hidden { display: none !important; }
        
        #progressBarContainer { width: 100%; background-color: #eee; border-radius: 2px; margin-top: 30px; height: 6px; overflow: hidden; }
        #progressBar { height: 100%; background-color: var(--goor-rood); width: 0%; transition: width 0.3s ease; }
        
        /* CERTIFICAAT OPMAAK */
        .certificate-box { 
            border: 2px solid var(--goor-goud); 
            padding: 40px 30px; 
            background: #fff; 
            position: relative;
            margin-top: 20px; 
        }
        .certificate-box::before { /* Dubbele rand effect voor strakke look */
            content: '';
            position: absolute;
            top: 6px; left: 6px; right: 6px; bottom: 6px;
            border: 1px solid var(--goor-goud);
            pointer-events: none;
        }
        .cert-title { font-size: 2.5em; color: var(--goor-goud); margin-bottom: 5px; }
        .cert-name { color: var(--goor-rood); font-size: 2.2em; margin: 15px 0 5px 0; font-weight: 700; font-family: 'Playfair Display', serif; }
        .cert-age { font-style: italic; color: #666; margin-bottom: 20px; font-family: 'Playfair Display', serif; }
        .cert-score { color: var(--text-color); font-size: 2em; margin: 20px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; padding: 15px 0; }

        /* OVERZICHT OPMAAK (Aan het einde) */
        .overview-container { margin-top: 50px; text-align: left; }
        .overview-title { border-bottom: 2px solid var(--goor-rood); padding-bottom: 10px; margin-bottom: 20px; }
        .overview-item { 
            background: #fff; 
            border: 1px solid #eee; 
            padding: 20px; 
            margin-bottom: 15px; 
            border-left: 5px solid #ccc;
            border-radius: 4px;
        }
        .overview-item.correct { border-left-color: #28a745; }
        .overview-item.wrong { border-left-color: var(--goor-rood); }
        .overview-item h4 { margin: 0 0 10px 0; font-family: 'Montserrat', sans-serif; font-size: 1.1em; color: #222; }
        .ans-user { font-weight: 600; margin: 5px 0; }
        .ans-correct { color: #28a745; font-weight: 600; margin: 5px 0; }
        .ans-explanation { margin-top: 10px; font-size: 0.9em; color: #555; background: #fafafa; padding: 10px; border-radius: 4px; }

        .btn-gold { background-color: var(--goor-goud); color: #fff; }
        .btn-gold:hover { background-color: #b8962c; }

        /* PRINT STIJLEN */
        @media print {
            body { background: white; margin: 0; padding: 0; display: block; }
            .quiz-wrapper { box-shadow: none; border: none; max-width: 100%; margin: 0; padding: 0; }
            h2.main-title, .wapen-img, .overview-container, button, #progressText { display: none !important; }
            .certificate-box { width: 100%; page-break-inside: avoid; border: 4px solid var(--goor-goud); }
            .certificate-box::before { border-width: 2px; }
        }
    </style>
</head>
<body>

<div class="quiz-wrapper">
    <img src="wapengoor.png" alt="Wapen van Goor" class="wapen-img">
    
    <h1 class="main-title">Goorsche Inburgering</h1>

    <div id="startScreen">
        <p>Test je kennis van de stad. Niet geslaagd? NIET WELKOM!</p>
        <div class="input-group">
            <label for="userName">Volledige Naam:</label>
            <input type="text" id="userName" placeholder="Bijv. Gait-Jan" autocomplete="name">
        </div>
        <div class="input-group">
            <label for="userDob">Geboortedatum (Verplicht voor certificaat):</label>
            <input type="date" id="userDob" required>
        </div>
        <button id="startButton">Inladen... (Wachten op stadhuis)</button>
    </div>

    <div id="quizContent" class="hidden">
        <div id="quizContainer"></div>
        <div class="quiz-navigation">
            <button id="actionButton" class="hidden">Vastleggen & Volgende</button>
            <div id="progressBarContainer"><div id="progressBar"></div></div>
            <p id="progressText" style="font-size: 0.85em; color: #888; font-weight: 600; margin-top: 10px; text-transform: uppercase;"></p>
        </div>
    </div>

    <div id="resultScreen" class="hidden">
        
        <div class="certificate-box" id="certificate">
            <h1 class="cert-title">Certificaat van Inburgering</h1>
            <p style="font-size: 1.1em; color: #555; text-transform: uppercase; letter-spacing: 2px; margin-top: 20px;">Hierbij wordt verklaard dat</p>
            <h2 id="resultName" class="cert-name"></h2>
            <p id="resultAge" class="cert-age"></p>
            
            <p style="font-size: 1.1em; color: #555;">de Goorsche inburgeringstest heeft afgelegd met het volgende resultaat:</p>
            
            <h1 id="resultScore" class="cert-score"></h1>
            
            <p id="resultVerdict" style="font-size: 1.2em; font-weight: 700; color: var(--goor-rood);"></p>
        </div>

        <button id="btnPrint" class="hidden btn-gold" onclick="window.print()">🖨️ Certificaat Printen</button>
        <button onclick="location.reload()" style="background-color: #333;">Nieuwe Kandidaat</button>

        <div class="overview-container" id="overviewContainer">
            <h2 class="overview-title">Jouw Antwoorden Overzicht</h2>
            <div id="overviewList"></div>
        </div>

    </div>
</div>

<script>
   document.addEventListener('DOMContentLoaded', () => {
    let questions = [];
    let passPercentage = 60; 
    let currentQuestionIndex = 0;
    let userAnswers = []; // Hier slaan we de gegeven antwoorden in op
    let userName = "";
    let userAge = 0;

    const screens = { start: document.getElementById('startScreen'), quiz: document.getElementById('quizContent'), result: document.getElementById('resultScreen') };
    const startButton = document.getElementById('startButton');
    const quizContainer = document.getElementById('quizContainer');
    const actionButton = document.getElementById('actionButton');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');

    // 1. Vragen ophalen uit de database
    async function fetchQuestions() {
        try {
            const response = await fetch('get_vragen.php');
            const data = await response.json();

            if(data.error) { alert(data.error); return; }
            
            questions = data.questions;
            passPercentage = data.settings.pass_percentage;

            startButton.textContent = "Start de test";
            startButton.disabled = false;
        } catch (error) {
            console.error("Fout bij ophalen:", error);
            startButton.textContent = "Netwerkfout. Controleer de server.";
        }
    }

    fetchQuestions();

    // 2. Quiz starten
    startButton.addEventListener('click', () => {
        if(questions.length === 0) return alert("Geen vragen gevonden!");
        
        const dobInput = document.getElementById('userDob').value;
        if(!dobInput) {
            alert("Vul alstublieft een geboortedatum in!");
            return;
        }

        userName = document.getElementById('userName').value.trim() || "Anonieme Tukker";
        
        // Leeftijd berekenen
        const dob = new Date(dobInput);
        const ageDifMs = Date.now() - dob.getTime();
        const ageDate = new Date(ageDifMs);
        userAge = Math.abs(ageDate.getUTCFullYear() - 1970);

        screens.start.classList.add('hidden');
        screens.quiz.classList.remove('hidden');
        loadQuestion();
    });

    // 3. Vraag inladen
    function loadQuestion() {
        let selectedAnswer = null;
        actionButton.classList.add('hidden');
        actionButton.onclick = null; // reset event

        const q = questions[currentQuestionIndex];
        let html = `<h2 style="font-size:1.5em; margin-bottom: 25px;">${q.question}</h2>`;
        
        q.options.forEach((opt, index) => {
            html += `<button class="option-button" onclick="selectOption(this, ${index})">${opt}</button>`;
        });

        quizContainer.innerHTML = html;
        updateProgress();

        // Globale functie voor het selecteren (zodat onclick werkt)
        window.selectOption = function(btn, index) {
            document.querySelectorAll('.option-button').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
            selectedAnswer = index;
            actionButton.classList.remove('hidden');
            
            actionButton.onclick = () => {
                userAnswers.push(selectedAnswer); // Sla antwoord op
                currentQuestionIndex++;
                if (currentQuestionIndex < questions.length) {
                    loadQuestion();
                } else {
                    generateResult(); // Test is klaar!
                }
            };
        };
    }

    function updateProgress() {
        const percent = (currentQuestionIndex / questions.length) * 100;
        progressBar.style.width = `${percent}%`;
        progressText.textContent = `Vraag ${currentQuestionIndex + 1} van ${questions.length}`;
    }

    // 4. Resultaat berekenen en Overzicht bouwen
    function generateResult() {
        screens.quiz.classList.add('hidden');
        screens.result.classList.remove('hidden');
        
        let score = 0;
        let overviewHTML = '';

        // Bereken score en bouw de HTML voor het overzicht tegelijkertijd op
        questions.forEach((q, index) => {
            const userAnswerIndex = userAnswers[index];
            const isCorrect = (userAnswerIndex === q.answer);
            
            if (isCorrect) score++;

            overviewHTML += `
                <div class="overview-item ${isCorrect ? 'correct' : 'wrong'}">
                    <h4>${index + 1}. ${q.question}</h4>
                    <div class="ans-user">Jouw keuze: ${q.options[userAnswerIndex]} ${isCorrect ? '✅' : '❌'}</div>
                    ${!isCorrect ? `<div class="ans-correct">Juiste antwoord: ${q.options[q.answer]}</div>` : ''}
                    <div class="ans-explanation"><strong>Toelichting:</strong> ${q.explanation}</div>
                </div>
            `;
        });

        // Vul het certificaat in
        document.getElementById('resultName').textContent = userName;
        document.getElementById('resultAge').textContent = `op de respectabele leeftijd van ${userAge} jaar`;
        document.getElementById('resultScore').textContent = `${score} / ${questions.length} Punten`;
        
        const userPercentage = (score / questions.length) * 100;
        let verdict = "";
        
        if (userPercentage >= passPercentage) {
            verdict = "GESLAAGD! OFFICIEEL INGEBURGERD.";
            document.getElementById('btnPrint').classList.remove('hidden');
        } else {
            verdict = `AFGEWEZEN. (${passPercentage}% VEREIST)`;
            document.getElementById('resultVerdict').style.color = '#C8102E'; // Hard rood voor gezakt
        }
        
        document.getElementById('resultVerdict').textContent = verdict;
        
        // Render het overzicht
        document.getElementById('overviewList').innerHTML = overviewHTML;
    }
});
</script>
</body>
</html>
